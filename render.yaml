services:
  - type: web
    name: tradosphere-v3
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --worker-class gthread --workers 1 --threads 8 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: ENABLE_WS_BROADCASTER
        value: "true"
      # Provision a Render "Key Value" (Redis) instance and paste its
      # Internal URL here (or set in the dashboard). If unset, the app runs
      # uncached — caching fails open and never blocks requests.
      - key: REDIS_URL
        sync: false
